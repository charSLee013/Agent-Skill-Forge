<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reference Template</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.5; max-width: 980px; margin: 40px auto; padding: 0 20px; color: #1f2933; }
    h1, h2 { line-height: 1.15; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; min-width: 620px; }
    th, td { border: 1px solid #cbd5df; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #eef3f7; }
  </style>
</head>
<body>
  <h1>Reference: Replace With Topic</h1>
  <p><strong>Use this when:</strong> Replace with the lookup scenario.</p>

  <section>
    <h2>Quick Map</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Meaning</th>
            <th>Boundary</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Replace</td>
            <td>Replace</td>
            <td>Replace</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section>
    <h2>Review Prompts</h2>
    <ol>
      <li>Replace with a retrieval question.</li>
      <li>Replace with a boundary-check question.</li>
    </ol>
  </section>

  <section>
    <h2>Next Action</h2>
    <p>Replace with the next review or lesson link.</p>
  </section>
</body>
</html>
